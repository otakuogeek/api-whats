name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: node --check src/server.js

      - name: Start app and smoke test
        run: |
          npm start &
          APP_PID=$!
          sleep 4
          curl -f http://127.0.0.1:3000/health
          kill $APP_PID
