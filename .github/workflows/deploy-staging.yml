name: Deploy Staging

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
      sha_tag: ${{ steps.meta.outputs.sha_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build metadata
        id: meta
        run: |
          IMAGE="ghcr.io/${{ github.repository }}"
          SHA_TAG="sha-${GITHUB_SHA::7}"
          echo "image=$IMAGE" >> $GITHUB_OUTPUT
          echo "sha_tag=$SHA_TAG" >> $GITHUB_OUTPUT

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha_tag }}
            ${{ steps.meta.outputs.image }}:staging

  deploy-to-staging:
    needs: build-and-push-image
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Deploy via SSH to staging server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -e
            docker login ghcr.io -u '${{ secrets.GHCR_USERNAME }}' -p '${{ secrets.GHCR_TOKEN }}'
            docker pull ${{ needs.build-and-push-image.outputs.image }}:${{ needs.build-and-push-image.outputs.sha_tag }}

            docker stop api-whats-staging || true
            docker rm api-whats-staging || true

            docker run -d \
              --name api-whats-staging \
              --restart unless-stopped \
              -p 3000:3000 \
              -e WHATSAPP_VERIFY_TOKEN='${{ secrets.WHATSAPP_VERIFY_TOKEN }}' \
              -e WHATSAPP_ACCESS_TOKEN='${{ secrets.WHATSAPP_ACCESS_TOKEN }}' \
              -e WHATSAPP_PHONE_NUMBER_ID='${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}' \
              -e META_APP_SECRET='${{ secrets.META_APP_SECRET }}' \
              -e OPENAI_API_KEY='${{ secrets.OPENAI_API_KEY }}' \
              -e OPENAI_MODEL='${{ vars.OPENAI_MODEL }}' \
              -e OPENAI_REASONING_EFFORT='${{ vars.OPENAI_REASONING_EFFORT }}' \
              -e REDIS_URL='${{ secrets.REDIS_URL }}' \
              -e MEMORY_MAX_MESSAGES='${{ vars.MEMORY_MAX_MESSAGES }}' \
              ${{ needs.build-and-push-image.outputs.image }}:${{ needs.build-and-push-image.outputs.sha_tag }}
